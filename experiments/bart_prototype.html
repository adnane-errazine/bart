<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440, initial-scale=1.0">
<title>BART — Art Analytics Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
:root{--bg-primary:#0A0A0B;--bg-secondary:#131316;--bg-tertiary:#1A1A1F;--bg-elevated:#1F1F25;--border-subtle:#26262E;--border-strong:#3A3A45;--text-primary:#E8E8EC;--text-secondary:#9EA0A6;--text-tertiary:#6B6D75;--text-disabled:#45464E;--accent-amber:#D4A017;--accent-amber-dim:#8C6B0F;--color-up:#4F9D69;--color-down:#C85450;--color-neutral:#8A8B91;--color-warning:#C99A3D;--tag-observed:#6B8FB8;--tag-estimated:#B8722F;--tag-interpreted:#8C7AAE;--font-sans:'IBM Plex Sans',-apple-system,system-ui,sans-serif;--font-serif:'Source Serif 4','Times New Roman',Georgia,serif;--font-mono:'IBM Plex Mono','Roboto Mono',monospace}
[data-theme="light"]{--bg-primary:#FAFAF9;--bg-secondary:#F2F2F0;--bg-tertiary:#E9E9E6;--bg-elevated:#FFFFFF;--border-subtle:#DCDCD7;--border-strong:#B8B8B2;--text-primary:#18181B;--text-secondary:#4D4F55;--text-tertiary:#75777E;--text-disabled:#A8AAB0;--accent-amber:#A57E0E;--accent-amber-dim:#D4A017;--color-up:#2E7045;--color-down:#A33A36;--color-neutral:#6E6F75;--color-warning:#8C6B19;--tag-observed:#4A6F94;--tag-estimated:#94521C;--tag-interpreted:#6F5C8E}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font-sans);font-size:13px;font-weight:400;line-height:1.45;color:var(--text-primary);background:var(--bg-primary);-webkit-font-smoothing:antialiased;overflow:hidden}
button,input,select,textarea{font:inherit;color:inherit;background:none;border:none;outline:none}
button{cursor:pointer}
a{color:inherit;text-decoration:none}
ul,ol{list-style:none}
table{border-collapse:collapse;width:100%}
img,svg{display:block;max-width:100%}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--bg-primary)}
::-webkit-scrollbar-thumb{background:var(--border-strong)}
::-webkit-scrollbar-thumb:hover{background:var(--text-tertiary)}
::selection{background:var(--accent-amber);color:var(--bg-primary)}
.app{display:grid;grid-template-columns:200px 1fr;grid-template-rows:60px 1fr;height:100vh;width:100vw}
.sidebar{grid-row:1/span 2;grid-column:1;background:var(--bg-secondary);border-right:1px solid var(--border-subtle);display:flex;flex-direction:column;overflow-y:auto}
.topbar{grid-row:1;grid-column:2;background:var(--bg-secondary);border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;gap:16px;padding:0 20px}
.main{grid-row:2;grid-column:2;background:var(--bg-primary);overflow-y:auto;position:relative}
.brand{padding:20px 16px 16px;border-bottom:1px solid var(--border-subtle)}
.brand-name{font-family:var(--font-serif);font-size:22px;font-weight:600;letter-spacing:-0.02em;color:var(--text-primary)}
.brand-name .accent{color:var(--accent-amber)}
.brand-tag{font-size:9px;text-transform:uppercase;letter-spacing:0.14em;color:var(--text-tertiary);margin-top:2px}
.nav-section{padding:12px 0}
.nav-section + .nav-section{border-top:1px solid var(--border-subtle)}
.nav-label{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-tertiary);font-weight:500;padding:4px 16px 8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:7px 16px;font-size:12.5px;color:var(--text-secondary);border-left:2px solid transparent;cursor:pointer;user-select:none;transition:background .08s}
.nav-item:hover{background:var(--bg-tertiary);color:var(--text-primary)}
.nav-item.active{color:var(--text-primary);background:var(--bg-tertiary);border-left-color:var(--accent-amber)}
.nav-item svg{width:14px;height:14px;stroke-width:1.6}
.nav-item-badge{margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary)}
.sidebar-footer{margin-top:auto;padding:12px 16px;border-top:1px solid var(--border-subtle);display:flex;align-items:center;gap:10px}
.user-avatar{width:28px;height:28px;background:var(--bg-tertiary);border:1px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;font-weight:500;color:var(--text-primary)}
.user-meta{flex:1;min-width:0}
.user-name{font-size:12px;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-tier{font-size:9px;text-transform:uppercase;letter-spacing:0.12em;color:var(--accent-amber);font-weight:500}
.icon-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;color:var(--text-tertiary);border:1px solid transparent;background:transparent}
.icon-btn:hover{color:var(--text-primary);border-color:var(--border-strong)}
.icon-btn svg{width:14px;height:14px;stroke-width:1.6}
.searchbar{position:relative;width:360px;height:32px;background:var(--bg-tertiary);border:1px solid var(--border-subtle);display:flex;align-items:center;padding:0 10px;gap:8px;transition:border-color .1s}
.searchbar:focus-within{border-color:var(--accent-amber)}
.searchbar svg{width:13px;height:13px;stroke-width:1.6;color:var(--text-tertiary)}
.searchbar input{flex:1;font-size:12px;color:var(--text-primary)}
.searchbar input::placeholder{color:var(--text-tertiary)}
.searchbar-kbd{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);border:1px solid var(--border-subtle);padding:1px 5px}
.ticker-rail{flex:1;height:32px;background:var(--bg-tertiary);border:1px solid var(--border-subtle);overflow:hidden;position:relative}
.ticker-track{display:flex;align-items:center;height:100%;gap:28px;padding:0 16px;white-space:nowrap;animation:ticker 60s linear infinite}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ticker-item{display:inline-flex;align-items:center;gap:8px;font-size:11px}
.ticker-name{text-transform:uppercase;letter-spacing:0.08em;color:var(--text-secondary);font-weight:500;font-size:10px}
.ticker-value{font-family:var(--font-mono);font-weight:500;color:var(--text-primary)}
.topbar-status{display:flex;align-items:center;gap:16px;font-size:11px;color:var(--text-tertiary)}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--color-up);margin-right:6px;box-shadow:0 0 0 2px color-mix(in srgb,var(--color-up) 18%,transparent)}
.topbar-divider{width:1px;height:20px;background:var(--border-subtle)}
.notif-btn{position:relative;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border-subtle);color:var(--text-secondary);background:transparent}
.notif-btn:hover{color:var(--text-primary);border-color:var(--border-strong)}
.notif-btn svg{width:14px;height:14px;stroke-width:1.6}
.notif-count{position:absolute;top:-4px;right:-4px;font-family:var(--font-mono);font-size:9px;background:var(--accent-amber);color:#0A0A0B;padding:1px 4px;font-weight:500;min-width:14px;text-align:center}
.h1{font-family:var(--font-serif);font-size:28px;font-weight:600;letter-spacing:-0.01em;color:var(--text-primary);line-height:1.15}
.h2{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-primary)}
.h3{font-size:12px;font-weight:600;color:var(--text-primary)}
.eyebrow{font-size:10px;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-tertiary);font-weight:500}
.eyebrow .sep{margin:0 6px;color:var(--border-strong)}
.caption{font-size:11px;color:var(--text-tertiary);letter-spacing:0.02em}
.mono{font-family:var(--font-mono);font-weight:500}
.serif{font-family:var(--font-serif)}
.text-secondary{color:var(--text-secondary)}
.text-tertiary{color:var(--text-tertiary)}
.text-up{color:var(--color-up)}
.text-down{color:var(--color-down)}
.text-amber{color:var(--accent-amber)}
.page{display:none;padding:24px 32px 48px;max-width:1600px}
.page.active{display:block}
.page-header{display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:16px;margin-bottom:20px;border-bottom:1px solid var(--border-subtle);gap:24px}
.page-header-left{flex:1;min-width:0}
.page-header-right{display:flex;align-items:center;gap:8px}
.section{margin-bottom:32px}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:8px 0;margin-bottom:12px;border-bottom:1px solid var(--border-subtle)}
.section-header-left{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
.section-tools{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text-tertiary)}
.tool-btn{font-size:11px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-secondary);padding:4px 8px;border:1px solid var(--border-subtle);background:transparent;cursor:pointer}
.tool-btn:hover{color:var(--text-primary);border-color:var(--border-strong)}
.tool-btn.active{color:var(--accent-amber);border-color:var(--accent-amber)}
.index-strip{display:grid;grid-template-columns:repeat(5,1fr);border:1px solid var(--border-subtle);background:var(--bg-secondary);margin-bottom:24px}
.index-card{padding:14px 16px;border-right:1px solid var(--border-subtle);cursor:pointer;transition:background .08s}
.index-card:last-child{border-right:none}
.index-card:hover{background:var(--bg-tertiary)}
.index-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.index-card-name{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-secondary);font-weight:600}
.index-card-value{font-family:var(--font-mono);font-size:24px;font-weight:500;color:var(--text-primary);letter-spacing:-0.02em;line-height:1.1;margin-bottom:4px}
.index-card-meta{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.index-card-spark{width:80px;height:24px}
.delta{font-family:var(--font-mono);font-size:11px;font-weight:500;display:inline-flex;align-items:center;gap:2px}
.delta.up{color:var(--color-up)}
.delta.down{color:var(--color-down)}
.delta.neutral{color:var(--text-secondary)}
.delta-tri{font-size:8px;line-height:1}
.panel{background:var(--bg-secondary);border:1px solid var(--border-subtle)}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border-subtle);background:var(--bg-secondary)}
.panel-title{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;font-weight:600;color:var(--text-primary)}
.panel-meta{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary)}
.panel-body{padding:14px}
.panel-body.flush{padding:0}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.grid-2-1{display:grid;grid-template-columns:2fr 1fr;gap:16px}
.grid-1-2{display:grid;grid-template-columns:1fr 2fr;gap:16px}
.grid-3-2{display:grid;grid-template-columns:3fr 2fr;gap:16px}
.dtable{width:100%;font-size:12px;border-collapse:collapse}
.dtable thead th{font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-tertiary);font-weight:500;text-align:left;padding:8px 12px;border-bottom:1px solid var(--border-subtle);background:var(--bg-secondary);position:sticky;top:0;white-space:nowrap}
.dtable thead th.num{text-align:right}
.dtable tbody td{padding:9px 12px;border-bottom:1px solid var(--border-subtle);color:var(--text-primary);vertical-align:middle;white-space:nowrap}
.dtable tbody td.num{text-align:right;font-family:var(--font-mono);font-weight:500}
.dtable tbody td.muted{color:var(--text-secondary)}
.dtable tbody tr:hover td{background:var(--bg-tertiary)}
.dtable tbody tr.clickable{cursor:pointer}
.dtable tbody tr:last-child td{border-bottom:none}
.dtable .row-icon{display:inline-flex;align-items:center;gap:8px}
.dtable .row-thumb{width:28px;height:28px;background:var(--bg-tertiary);border:1px solid var(--border-subtle);flex-shrink:0;overflow:hidden}
.dtable .row-name{font-weight:500}
.dtable .row-sub{font-size:10px;color:var(--text-tertiary)}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;font-weight:500;padding:2px 8px;border:1px solid var(--border-subtle);color:var(--text-secondary)}
.tag-dot{display:inline-block;width:6px;height:6px;border-radius:50%}
.tag.observed .tag-dot,.tag-dot.observed{background:var(--tag-observed)}
.tag.estimated .tag-dot,.tag-dot.estimated{background:var(--tag-estimated)}
.tag.interpreted .tag-dot,.tag-dot.interpreted{background:var(--tag-interpreted)}
.tag.observed{color:var(--tag-observed);border-color:color-mix(in srgb,var(--tag-observed) 35%,transparent)}
.tag.estimated{color:var(--tag-estimated);border-color:color-mix(in srgb,var(--tag-estimated) 35%,transparent)}
.tag.interpreted{color:var(--tag-interpreted);border-color:color-mix(in srgb,var(--tag-interpreted) 35%,transparent)}
.pill{display:inline-flex;align-items:center;font-size:10px;letter-spacing:0.04em;padding:3px 8px;background:var(--bg-tertiary);border:1px solid var(--border-subtle);color:var(--text-secondary);cursor:pointer}
.pill:hover{color:var(--text-primary);border-color:var(--border-strong)}
.score-dots{display:inline-flex;gap:3px;align-items:center}
.score-dot{width:8px;height:8px;background:var(--border-strong)}
.score-dot.filled{background:var(--accent-amber)}
.score-circle{position:relative;width:120px;height:120px}
.score-circle svg{width:100%;height:100%;transform:rotate(-90deg)}
.score-circle-track{fill:none;stroke:var(--border-subtle);stroke-width:6}
.score-circle-fill{fill:none;stroke:var(--accent-amber);stroke-width:6;stroke-linecap:butt}
.score-circle-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-circle-value{font-family:var(--font-mono);font-size:28px;font-weight:500;color:var(--text-primary);letter-spacing:-0.02em;line-height:1}
.score-circle-max{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);margin-top:2px}
.score-circle-label{font-size:9px;text-transform:uppercase;letter-spacing:0.12em;color:var(--text-secondary);margin-top:4px;font-weight:500;text-align:center}
.metric{padding:14px 16px;border:1px solid var(--border-subtle);background:var(--bg-secondary)}
.metric.flush{background:transparent;border:none;padding:0}
.metric-label{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-tertiary);font-weight:500;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.metric-value{font-family:var(--font-mono);font-size:22px;font-weight:500;color:var(--text-primary);letter-spacing:-0.02em;line-height:1.1}
.metric-value.lg{font-size:32px}
.metric-value.sm{font-size:16px}
.metric-sub{font-size:11px;color:var(--text-secondary);margin-top:4px}
.metric-band{display:flex;align-items:center;gap:8px;margin-top:8px}
.metric-band-bar{flex:1;height:4px;background:var(--border-subtle);position:relative}
.metric-band-fill{height:100%;background:var(--accent-amber)}
.chart-wrap{position:relative;width:100%}
.range-tabs{display:flex;gap:1px;background:var(--border-subtle);border:1px solid var(--border-subtle)}
.range-tab{font-family:var(--font-mono);font-size:10px;padding:4px 9px;background:var(--bg-secondary);color:var(--text-secondary);font-weight:500}
.range-tab:hover{color:var(--text-primary)}
.range-tab.active{background:var(--bg-elevated);color:var(--accent-amber)}
.legend-row{display:flex;flex-wrap:wrap;gap:16px;font-size:11px;color:var(--text-secondary);margin-top:12px}
.legend-item{display:inline-flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.legend-swatch{width:12px;height:2px}
.legend-item.muted{opacity:0.4}
.artwork-header{display:grid;grid-template-columns:320px 1fr;gap:28px;align-items:start;padding:8px 0 28px;border-bottom:1px solid var(--border-subtle);margin-bottom:24px}
.artwork-image{aspect-ratio:4/5;background:var(--bg-tertiary);border:1px solid var(--border-subtle);position:relative;overflow:hidden}
.artwork-image-tag{position:absolute;bottom:8px;right:8px;font-family:var(--font-mono);font-size:10px;background:rgba(10,10,11,0.8);color:var(--text-secondary);padding:3px 6px;border:1px solid var(--border-subtle)}
[data-theme="light"] .artwork-image-tag{background:rgba(255,255,255,0.9)}
.artwork-meta-grid{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--border-subtle);border-left:1px solid var(--border-subtle);margin-top:16px}
.artwork-meta-cell{padding:10px 12px;border-right:1px solid var(--border-subtle);border-bottom:1px solid var(--border-subtle)}
.artwork-meta-cell .metric-label{margin-bottom:4px}
.artwork-meta-cell .metric-val{font-size:12px;font-weight:500;color:var(--text-primary)}
.artwork-title-block{margin-bottom:12px}
.artwork-artist-name{font-family:var(--font-serif);font-size:32px;font-weight:600;letter-spacing:-0.02em;color:var(--text-primary);line-height:1.05}
.artwork-title{font-family:var(--font-serif);font-size:20px;font-style:italic;font-weight:400;color:var(--text-secondary);margin-top:4px}
.signature-metrics{display:grid;grid-template-columns:200px 1fr 1fr 1fr;border:1px solid var(--border-subtle);background:var(--bg-secondary);margin-bottom:24px}
.sig-cell{padding:18px 20px;border-right:1px solid var(--border-subtle)}
.sig-cell:last-child{border-right:none}
.sig-cell.score{display:flex;align-items:center;justify-content:center}
.sig-cell .metric-label{margin-bottom:8px}
.story-panel{display:grid;grid-template-columns:1fr 280px;gap:28px;padding:20px;background:var(--bg-secondary);border:1px solid var(--border-subtle)}
.story-text{font-family:var(--font-serif);font-size:14.5px;line-height:1.6;color:var(--text-primary)}
.story-text p + p{margin-top:12px}
.story-text em{color:var(--text-secondary);font-style:italic}
.story-side{border-left:1px solid var(--border-subtle);padding-left:24px;font-size:11px;color:var(--text-tertiary);line-height:1.55}
.story-side h4{font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-secondary);font-weight:600;margin-bottom:8px}
.story-side ul li{padding:3px 0}
.story-side ul li::before{content:'\00B7  ';color:var(--text-disabled)}
.sales-block{display:grid;grid-template-columns:380px 1fr;border:1px solid var(--border-subtle);background:var(--bg-secondary)}
.sales-timeline{padding:16px;border-right:1px solid var(--border-subtle)}
.sales-timeline-item{display:grid;grid-template-columns:56px 1fr;gap:12px;padding:10px 0;border-bottom:1px solid var(--border-subtle)}
.sales-timeline-item:last-child{border-bottom:none}
.sales-timeline-year{font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);padding-top:2px}
.sales-timeline-body{font-size:11.5px}
.sales-timeline-venue{color:var(--text-primary);font-weight:500}
.sales-timeline-detail{color:var(--text-tertiary);font-size:10.5px;margin-top:2px}
.sales-timeline-price{font-family:var(--font-mono);font-weight:500;font-size:12px;margin-top:3px;color:var(--text-primary)}
.sales-chart-wrap{padding:16px;display:flex;flex-direction:column}
.driver-card{background:var(--bg-elevated);border:1px solid var(--border-subtle);padding:14px}
.driver-num{font-family:var(--font-mono);font-size:10px;color:var(--accent-amber);margin-bottom:6px}
.driver-title{font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:6px}
.driver-text{font-size:11.5px;color:var(--text-secondary);line-height:1.5}
.driver-impact{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);margin-top:8px;padding-top:8px;border-top:1px solid var(--border-subtle)}
.risk-block{margin-top:16px;padding:14px 16px;border:1px solid color-mix(in srgb,var(--color-warning) 35%,transparent);background:color-mix(in srgb,var(--color-warning) 6%,transparent)}
.risk-title{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;font-weight:600;color:var(--color-warning);margin-bottom:6px}
.risk-text{font-size:11.5px;color:var(--text-secondary);line-height:1.5}
.work-cells{display:grid;grid-template-columns:1fr 1fr;border:1px solid var(--border-subtle);background:var(--bg-secondary)}
.work-cell{padding:18px 20px;border-right:1px solid var(--border-subtle);border-bottom:1px solid var(--border-subtle)}

/* ============================================================

const BART_DATA = {};
function synthSeries(start, end, points, vol) {
  const arr = [start];
  const r = (end / start) ** (1 / (points - 1)) - 1;
  for (let i = 1; i < points; i++) {
    const shock = (Math.sin(i * 0.7) + Math.cos(i * 1.3) + Math.sin(i * 0.31)) * vol * 0.01;
    arr.push(arr[i - 1] * (1 + r + shock));
  }
  arr[points - 1] = end;
  return arr.map(v => +v.toFixed(2));
}

  { id: 'blue_chip', name: 'BART BLUE CHIP', short: 'BBC', value: 358.42, change1d: -0.34, change7d: 1.21, change30d: 2.84, changeYtd: 8.42, change1y: 11.27, change5y: 47.81, vol: 14.2, volume: '$5.4B', confidence: 88, scope: '100 deceased majors post-1850', method: 'Repeat-Sales', desc: 'Artistes décédés majeurs, établis depuis plus de 30 ans. Référence trophy assets. Volatilité contenue, corrélation modérée à l\'inflation.' },
  { id: 'modern',    name: 'BART MODERN MASTERS', short: 'BMM', value: 432.18, change1d: 0.18, change7d: 0.84, change30d: 3.41, changeYtd: 11.6, change1y: 14.8, change5y: 62.4, vol: 18.1, volume: '$3.1B', confidence: 81, scope: '120 moderns post-1945', method: 'Hedonic+Repeat', desc: 'Artistes modernes établis post-1945. Effet career stage très marqué — Hockney, Richter, Kusama portés par les rétrospectives muséales.' },
  { id: 'ultra',     name: 'BART ULTRA-CONTEMPORARY', short: 'BUC', value: 681.45, change1d: 1.42, change7d: 4.12, change30d: 8.84, changeYtd: 24.7, change1y: 36.1, change5y: 247.3, vol: 31.4, volume: '$1.2B', confidence: 64, scope: '180 living, born > 1975', method: 'Hedonic', desc: 'Artistes vivants nés après 1975, secondaire actif depuis 2010. Le segment qui a le mieux performé sur 5 ans (+247%). Aussi le plus risqué.' },
  { id: 'photo',     name: 'BART PHOTOGRAPHY', short: 'BPH', value: 298.71, change1d: -0.12, change7d: 0.42, change30d: 1.02, changeYtd: 4.81, change1y: 6.42, change5y: 31.8, vol: 16.3, volume: '$0.4B', confidence: 73, scope: '85 photographers 1900-now', method: 'Hedonic', desc: 'Photographie de collection. Faible corrélation aux autres indices (~0.3 vs Blue Chip). Excellent diversificateur. Düsseldorf School poids dominant.' },
  { id: 'street',    name: 'BART STREET & URBAN', short: 'BSU', value: 478.12, change1d: 2.18, change7d: 6.41, change30d: 12.72, changeYtd: 31.4, change1y: 42.8, change5y: 184.6, vol: 32.8, volume: '$0.3B', confidence: 58, scope: '60 street artists', method: 'Repeat-Sales', desc: 'Art urbain accepté en circuit institutionnel. Porté par les jeunes UHNWIs et le segment millennials/tech entrepreneurs. Volatilité élevée.' }
];
BART_DATA.indices.forEach(i => {
  const startVal = i.value / (1 + i.change5y / 100);
  i.history5y = synthSeries(startVal, i.value, 60, i.vol / 4);
  i.spark30d = synthSeries(i.value * 0.97, i.value, 30, i.vol / 6);
});

}

/* sparkline (mini SVG) */
function sparkline(values, w = 80, h = 24, dir = null) {
  if (!values || !values.length) return '';
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const step = w / (values.length - 1);
  const path = values.map((v, i) => `${i === 0 ? 'M' : 'L'}${(i * step).toFixed(2)},${(h - ((v - min) / range) * h).toFixed(2)}`).join(' ');
  const cls = dir || (values[values.length - 1] > values[0] ? 'up' : 'down');
  return `<svg class="index-card-spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><path class="spark-line ${cls}" d="${path}"/></svg>`;
}

/* score circle SVG */
function scoreCircle(value, max = 100, label = 'BART SCORE') {
  const r = 52, cx = 60, cy = 60;
  const circumference = 2 * Math.PI * r;
  const offset = circumference - (value / max) * circumference;
  return `<div class="score-circle">
    <svg viewBox="0 0 120 120">
      <circle class="score-circle-track" cx="${cx}" cy="${cy}" r="${r}"></circle>
      <circle class="score-circle-fill" cx="${cx}" cy="${cy}" r="${r}" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"></circle>
    </svg>
    <div class="score-circle-inner">
      <div class="score-circle-value">${value}</div>
      <div class="score-circle-max">/ ${max}</div>
      <div class="score-circle-label">${label}</div>
    </div>
  </div>`;
}

/* score dots: 10 dots, n filled = score/10 */
function scoreDots(score, max = 100) {
  const filled = Math.round((score / max) * 10);
  let html = '<span class="score-dots">';
  for (let i = 0; i < 10; i++) html += `<span class="score-dot${i < filled ? ' filled' : ''}"></span>`;
  html += '</span>';
  return html;
}

/* synthesize a 'painting' SVG from a seed — placeholder image without external assets */
function synthPainting(seed = 1) {
  let s = (seed * 31 + 7) | 0;
  const rand = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
  const palettes = [
    ['#3a2410', '#7a3a1a', '#c47636', '#e3a052', '#f0c890', '#1a1410'],
    ['#102338', '#1d4565', '#3a7ba8', '#7eb0d1', '#c4d8e8', '#0a1620'],
    ['#3a1228', '#6e2545', '#a44871', '#cf78a0', '#e8a8c8', '#1a0a14'],
    ['#1f2818', '#3e5230', '#6b8852', '#9bbc7a', '#cae0a8', '#0c1208'],
    ['#2a1a06', '#5a3a18', '#8e6438', '#bd966a', '#e0c498', '#160d05'],
    ['#1a1d2a', '#2c3445', '#5d6d8a', '#94a4bd', '#c4d0e0', '#0e1018']
  ];
  const palette = palettes[Math.abs(seed) % palettes.length];
  const w = 400, h = 500;
  let svg = `<svg class="synth-painting" viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">`;
  svg += `<rect width="${w}" height="${h}" fill="${palette[5]}"/>`;
  for (let i = 0; i < 14; i++) {
    const cx = rand() * w, cy = rand() * h;
    const rx = 60 + rand() * 180, ry = 50 + rand() * 150;
    const c = palette[Math.floor(rand() * 5)];
    const op = 0.18 + rand() * 0.32;
    svg += `<ellipse cx="${cx.toFixed(0)}" cy="${cy.toFixed(0)}" rx="${rx.toFixed(0)}" ry="${ry.toFixed(0)}" fill="${c}" opacity="${op.toFixed(2)}"/>`;
  }
  for (let i = 0; i < 22; i++) {
    const x1 = rand() * w, y1 = rand() * h;
    const x2 = x1 + (rand() - 0.5) * 200, y2 = y1 + (rand() - 0.5) * 220;
    const cx1 = (x1 + x2) / 2 + (rand() - 0.5) * 80, cy1 = (y1 + y2) / 2 + (rand() - 0.5) * 80;
    const c = palette[Math.floor(rand() * 5)];
    const sw = 1.5 + rand() * 6;
    const op = 0.4 + rand() * 0.4;
    svg += `<path d="M${x1.toFixed(0)},${y1.toFixed(0)} Q${cx1.toFixed(0)},${cy1.toFixed(0)} ${x2.toFixed(0)},${y2.toFixed(0)}" stroke="${c}" stroke-width="${sw.toFixed(1)}" fill="none" opacity="${op.toFixed(2)}" stroke-linecap="round"/>`;
  }
  svg += `</svg>`;
  return svg;
}

function synthPortrait(seed = 1) {
  const palettes = [['#241810','#3e2818','#62402a','#87603e'],['#181c20','#2d3942','#4f6878','#7a93a3']];

  return `<svg class="synth-painting" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <rect width="200" height="200" fill="${p[0]}"/>

    out.push((d.getMonth() === 0) ? d.getFullYear().toString() : '');

  return out;
}

/* DONUT (allocation) */
function donutSVG(data, size = 180) {
  const r = size / 2 - 8, cx = size / 2, cy = size / 2;
  const total = data.reduce((s, d) => s + d.pct, 0);
  let acc = 0;
  let segs = '';
  data.forEach(d => {
    const start = (acc / total) * 2 * Math.PI - Math.PI / 2;
    acc += d.pct;
    const end = (acc / total) * 2 * Math.PI - Math.PI / 2;
    const x1 = cx + r * Math.cos(start), y1 = cy + r * Math.sin(start);
    const x2 = cx + r * Math.cos(end), y2 = cy + r * Math.sin(end);
    const large = (end - start) > Math.PI ? 1 : 0;
    segs += `<path d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${large} 1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${d.color}" stroke="${cssVar('--bg-secondary')}" stroke-width="2"/>`;
  });
  segs += `<circle cx="${cx}" cy="${cy}" r="${(r * 0.6).toFixed(2)}" fill="${cssVar('--bg-secondary')}"/>`;
  return `<svg class="donut" viewBox="0 0 ${size} ${size}">${segs}</svg>`;
}

}

  home: { render: renderHome, init: initHome, label: 'Home' },
  markets: { render: renderMarkets, init: initMarkets, label: 'Markets' },
  indices: { render: renderIndices, init: initIndices, label: 'Indices' },
  artwork: { render: renderArtwork, init: initArtwork, label: 'Artwork' },
  artist: { render: renderArtist, init: initArtist, label: 'Artist' },
  trade: { render: renderTrade, init: initTrade, label: 'Trade' },
  portfolio: { render: renderPortfolio, init: initPortfolio, label: 'Portfolio' },
  signals: { render: renderSignals, init: initSignals, label: 'Signals' },
  galleries: { render: renderGalleries, init: initGalleries, label: 'Galleries' },
  watchlist: { render: renderWatchlist, init: initWatchlist, label: 'Watchlist' },
  movements: { render: renderMovements, init: initMovements, label: 'Movements' },
  research: { render: renderResearch, init: initResearch, label: 'Research' },
  reports: { render: renderReports, init: initReports, label: 'Reports' }
};

let _currentRoute = 'home';
let _currentRouteArg = null;

function navigate(routeName, arg) {
  const route = ROUTES[routeName];
  if (!route) return;
  _currentRoute = routeName;
  _currentRouteArg = arg;

  // update sidebar active state
  $$('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.route === routeName));

  // render
  const main = $('#main');
  main.innerHTML = `<section class="page active">${route.render(arg)}</section>`;
  main.scrollTop = 0;

  // re-init lucide icons
  if (window.lucide && window.lucide.createIcons) {
    window.lucide.createIcons();
  }

  // init charts (after DOM mounted)
  setTimeout(() => { try { route.init && route.init(); } catch(e) { console.error(e); } }, 0);
}

window.rerenderCurrentRoute = function() {
  navigate(_currentRoute, _currentRouteArg);
};

/* CLICK DELEGATION — any element with data-route navigates */
function setupRouting() {
  document.body.addEventListener('click', (e) => {
    let el = e.target;
    while (el && el !== document.body) {
      if (el.dataset && el.dataset.route) {
        const route = el.dataset.route;
        const arg = el.dataset.artworkId || el.dataset.artistId || el.dataset.indexId;
        e.preventDefault();
        navigate(route, arg);
        return;
      }
      // index tab inside markets
      if (el.dataset && el.dataset.indexTab) {
        e.preventDefault();
        navigate('markets', el.dataset.indexTab);
        return;
      }
      el = el.parentElement;
    }
  });
}

/* APP BOOTSTRAP */
document.addEventListener('DOMContentLoaded', () => {
  if (window.lucide && window.lucide.createIcons) window.lucide.createIcons();
  renderTicker();
  setupTheme();
  setupRouting();
  navigate('home');
});
